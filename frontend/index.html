<!DOCTYPE html>
<html>
<head>
    <title>CodeSentinel</title>
    <style>
        body {
            background-color: #0f1117;
            color: #ffffff;
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 { color: #4fc3f7; }

        select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
        }

        textarea {
            background-color: #1e1e2e;
            color: #ffffff;
            height: 200px;
        }

        button {
            background-color: #4fc3f7;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover { background-color: #81d4fa; }

        .vuln-card {
            background-color: #1e1e2e;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .severity-Critical { color: #ff5555; }
        .severity-High { color: #ffaa00; }
        .severity-Medium { color: #4fc3f7; }
        .severity-Low { color: #50fa7b; }

        .tabs { display: flex; gap: 10px; margin-top: 20px; }

        .tab-btn {
            width: auto;
            padding: 8px 20px;
            background-color: #1e1e2e;
            color: #ffffff;
            cursor: pointer;
            border-radius: 6px;
        }

        .tab-btn.active {
            background-color: #4fc3f7;
            color: #000000;
        }
    </style>
</head>
<body>

    <h1>🛡️ CodeSentinel</h1>
    <p>AI-Powered Vulnerability Scanner</p>

    <div class="tabs">
        <button id="historyBtn" style="margin-top:20px; background-color:#1e1e2e; color:#4fc3f7;">
            📋 View Scan History
        </button>
        <button class="tab-btn active" onclick="switchTab('paste', event)">Paste Code</button>
        <button class="tab-btn" onclick="switchTab('upload', event)">Upload File</button>
    </div>

    <div id="paste-tab">
        <select id="language">
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="php">PHP</option>
            <option value="java">Java</option>
        </select>
        <textarea id="code" placeholder="Paste your code here..."></textarea>
        <button id="scanBtn">Scan Code</button>
    </div>

    <div id="upload-tab" style="display:none;">
        <input type="file" id="fileInput" accept=".py,.js,.php,.java,.ts,.cpp,.c,.rb">
        <button id="scanFileBtn">Scan File</button>
    </div>

    <div id="results"></div>

    <script>
        function switchTab(tab, event) {
            document.getElementById("paste-tab").style.display = tab === "paste" ? "block" : "none";
            document.getElementById("upload-tab").style.display = tab === "upload" ? "block" : "none";
            document.querySelectorAll(".tab-btn").forEach(function(btn) {
                btn.classList.remove("active");
            });
            event.target.classList.add("active");
        }

        function showResults(data) {
            var html = "";
            data.vulnerabilities.forEach(function(v) {
                html += "<div class='vuln-card'>";
                html += "<h3 class='severity-" + v.severity + "'>" + v.severity + " — " + v.name + "</h3>";
                html += "<p><strong>Line:</strong> " + v.line + "</p>";
                html += "<p><strong>Description:</strong> " + v.description + "</p>";
                html += "<p><strong>Fix:</strong> " + v.fix + "</p>";
                html += "</div>";
            });
            document.getElementById("results").innerHTML = html;
        }

        document.getElementById("scanBtn").onclick = function() {
            var code = document.getElementById("code").value;
            var language = document.getElementById("language").value;
            document.getElementById("results").innerHTML = "Scanning...";
            fetch("http://127.0.0.1:8000/scan", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ code: code, language: language })
            })
            .then(function(response) { return response.json(); })
            .then(function(data) { showResults(data); });
        }

        document.getElementById("scanFileBtn").onclick = function() {
            var file = document.getElementById("fileInput").files[0];
            if (!file) { alert("Please select a file first!"); return; }
            document.getElementById("results").innerHTML = "Scanning file...";
            var formData = new FormData();
            formData.append("file", file);
            fetch("http://127.0.0.1:8000/scan-file", {
                method: "POST",
                body: formData
            })
            .then(function(response) { return response.json(); })
            .then(function(data) { showResults(data); });
            
            document.getElementById("historyBtn").onclick = function() {
                fetch("http://127.0.0.1:8000/history")
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    var html = "<h2 style='color:#4fc3f7'>Scan History</h2>";
                    
                    if (data.length === 0) {
                        html += "<p>No scans yet.</p>";
                    }

                    data.forEach(function(scan) {
                        html += "<div class='vuln-card'>";
                        html += "<p><strong>Language:</strong> " + scan.language + "</p>";
                        html += "<p><strong>Findings:</strong> " + scan.total_findings + "</p>";
                        html += "<p><strong>Date:</strong> " + scan.created_at + "</p>";
                        html += "</div>";
                    });

                    document.getElementById("results").innerHTML = html;
                });
            }
        }
    </script>

</body>
</html>
